<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mapping Engine v10.0-TEST</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @keyframes super-flash {
            0% { opacity: 0; transform: scale(0.9); }
            20% { opacity: 0.8; transform: scale(1.1); background-color: #16a34a; }
            40% { opacity: 0; transform: scale(1); }
            60% { opacity: 0.8; transform: scale(1.1); background-color: #16a34a; }
            100% { opacity: 0; transform: scale(1); }
        }
        .flash-overlay {
            position: absolute;
            pointer-events: none;
            z-index: 9999;
            border-radius: 4px;
            box-shadow: 0 0 15px rgba(22, 163, 74, 0.5);
            animation: super-flash 0.8s ease-out forwards;
        }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .inspector-blur { backdrop-filter: blur(12px); background-color: rgba(255, 255, 255, 0.98); }
        
        /* GRILLE ULTRA-COMPACTE */
        .grid-fixed { table-layout: fixed; width: 100%; border-spacing: 0; }
        .col-code { width: 40px; min-width: 40px; }
        .col-label { width: 200px; min-width: 200px; }
        .col-data { width: 80px; min-width: 80px; }

        .switch { position: relative; display: inline-block; width: 28px; height: 16px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .3s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 10px; width: 10px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: #2563eb; }
        input:checked + .slider:before { transform: translateX(12px); }

        .acc-item-selected:hover { background-color: #1e40af !important; }

        .help-tooltip { visibility: hidden; opacity: 0; transition: opacity 0.3s, visibility 0.3s; }
        .help-trigger:hover .help-tooltip { visibility: visible; opacity: 1; }
    </style>
</head>
<body class="bg-slate-100 h-screen overflow-hidden font-sans text-slate-800">

<div class="flex flex-col h-full">
    <header class="h-14 bg-white border-b border-slate-200 flex items-center justify-between px-4 shrink-0 shadow-sm z-[100]">
        
        <div class="flex items-center gap-3">
            <input type="file" id="balanceInput" accept=".csv, .xlsx, .xls" class="hidden">
            <button onclick="document.getElementById('balanceInput').click()" class="flex items-center gap-2 px-3 py-1.5 bg-blue-600 hover:bg-blue-700 text-white rounded-md text-xs font-bold shadow transition-all active:scale-95 shrink-0">
                <i data-lucide="file-up" class="w-3.5 h-3.5"></i> Charger Balance
            </button>
            
            <div class="flex items-center gap-3 bg-blue-50 border border-blue-100 rounded-lg px-3 py-1 shadow-inner shrink-0">
                <div class="flex flex-col">
                    <span class="text-[8px] font-black text-blue-400 uppercase leading-none">Comptes</span>
                    <span id="totalAcc" class="text-[11px] font-black text-blue-700">0</span>
                </div>
                <div class="w-px h-6 bg-blue-200"></div>
                
                <div class="flex items-center gap-1.5 relative group">
                    <div class="help-trigger">
                        <i data-lucide="help-circle" class="w-3.5 h-3.5 text-blue-400 cursor-help hover:text-blue-600"></i>
                        <div class="help-tooltip absolute left-0 top-10 w-56 p-2.5 bg-slate-900/95 text-white text-[10px] rounded-lg shadow-2xl backdrop-blur-sm z-[110] pointer-events-none">
                            <p class="font-bold mb-1 text-blue-400 italic text-[11px]">Masque de formatage :</p>
                            <p class="opacity-90 mb-2 leading-relaxed text-slate-300 text-[9px]">Définit les segments (points).</p>
                        </div>
                    </div>
                    <input type="text" id="maskInput" placeholder="Masque" 
                        class="w-16 bg-white border border-blue-200 rounded px-1.5 py-0.5 text-[10px] font-black text-blue-800 outline-none focus:border-blue-500 shadow-sm placeholder:text-blue-200" 
                        oninput="this.value = this.value.replace(/[^0-9.]/g, ''); renderAccounts()">
                </div>

                <div class="w-px h-6 bg-blue-200"></div>
                <div class="flex items-center gap-2">
                    <label class="switch"><input type="checkbox" id="unmappedOnly" onchange="renderAccounts()"><span class="slider"></span></label>
                    <span class="text-[9px] font-bold text-blue-700 uppercase">Non-mappés</span>
                </div>
                <div class="w-px h-6 bg-blue-200"></div>
                <div class="flex flex-col items-end">
                    <span class="text-[8px] font-black text-slate-400 uppercase leading-none">Restants</span>
                    <div class="flex items-baseline gap-1 leading-none">
                        <span id="absRemains" class="text-[11px] font-black text-blue-900">0</span>
                        <span id="pctRemains" class="text-[9px] font-bold text-blue-500">(0%)</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex items-center gap-4 ml-auto">
            
            <div class="flex items-center gap-2 bg-slate-50 border border-slate-200 rounded-lg p-1 shadow-sm shrink-0">
                <span class="text-[9px] font-black text-slate-500 uppercase tracking-tight px-1">Sauvegarde WIP</span>
                <button onclick="exportStateJSON()" title="Sauvegarder l'état complet (En-cours + Balance)" class="p-1 text-slate-600 hover:text-blue-600 hover:bg-white rounded transition-colors">
                    <i data-lucide="save" class="w-3.5 h-3.5"></i>
                </button>
                <input type="file" id="stateJsonInput" accept=".json" class="hidden" onchange="importStateJSON(event)">
                <button onclick="document.getElementById('stateJsonInput').click()" title="Reprendre une session sauvegardée (.json)" class="p-1 text-slate-600 hover:text-blue-600 hover:bg-white rounded transition-colors">
                    <i data-lucide="folder-open" class="w-3.5 h-3.5"></i>
                </button>
                
                <div class="w-px h-4 bg-slate-200 mx-0.5"></div>
                
                <span class="text-[9px] font-black text-slate-500 uppercase tracking-tight px-1">Charger Mapping csv</span>
                <input type="file" id="auditCsvInput" accept=".csv" class="hidden" onchange="importAuditCSV(event)">
                <button onclick="document.getElementById('auditCsvInput').click()" title="Audit Externe : Charger un livrable existant (.csv)" class="p-1 text-slate-600 hover:text-emerald-600 hover:bg-white rounded transition-colors">
                    <i data-lucide="file-check" class="w-3.5 h-3.5 text-emerald-600"></i>
                </button>
            </div>

            <div class="flex items-center gap-3 border-l border-slate-200 pl-4 h-full select-none shrink-0">
                <div class="flex flex-col items-end">
                    <span class="font-black text-[13px] tracking-[0.18em] text-slate-900 uppercase leading-none font-mono">MAPPING IS BORING</span>
                    <span class="text-[8px] font-bold text-slate-400 tracking-[0.12em] uppercase mt-1 leading-none">BY ERIC MUNSCHI</span>
                </div>
                <span class="text-[10px] font-black bg-blue-600 text-white px-2 py-0.5 rounded shadow-sm tracking-tight">v10.0-TEST</span>
            </div>

            <button onclick="exportMappingCSV()" class="flex items-center gap-2 px-3 py-1.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-md text-xs font-bold shadow-sm transition-all active:scale-95 shrink-0">
                <i data-lucide="download" class="w-3.5 h-3.5"></i> Export Mapping
            </button>

            <div class="flex items-center gap-1.5 bg-slate-100 border border-slate-300 rounded p-1 shadow-inner">
                <select id="brandSelect" class="bg-white text-slate-800 rounded px-2 py-1 text-xs font-black outline-none border border-slate-200 hover:border-blue-400 cursor-pointer transition-colors shrink-0 max-w-[120px]" onchange="handleBrandChange()">
                    <option value="ALL">TOUTES</option>
                </select>
                
                <i data-lucide="chevron-right" class="w-3 h-3 text-slate-400"></i>

                <select id="section" class="bg-blue-600 text-white rounded px-2.5 py-1 text-xs font-black outline-none border border-blue-700 hover:bg-blue-700 cursor-pointer transition-colors shrink-0" onchange="switchSection()">
                    <option value="NONE">CHARGEMENT GRILLE...</option>
                </select>
            </div>
        </div>
    </header>

    <main class="flex flex-1 overflow-hidden">
        <aside class="w-[605px] bg-white border-r border-slate-200 flex flex-col shadow-lg z-20 shrink-0">
            <div class="p-3 border-b border-slate-100 flex flex-col gap-2 bg-slate-50/50">
                <div class="flex items-center gap-2">
                    <div class="relative flex-1">
                        <div class="absolute left-3 top-1/2 -translate-y-1/2 flex items-center gap-1 help-trigger z-30">
                            <i data-lucide="help-circle" class="w-3.5 h-3.5 text-slate-400 cursor-help hover:text-blue-500"></i>
                        </div>
                        <input type="text" id="accFilter" placeholder="Filtrer compte..." class="w-full pl-9 pr-2 py-1.5 bg-white border border-slate-200 rounded text-xs outline-none focus:border-blue-400 shadow-sm" oninput="renderAccounts()">
                    </div>
                    <div class="flex items-center bg-white border border-slate-200 rounded p-0.5 shadow-sm">
                        <button onclick="toggleLenOp()" id="lenOp" class="w-5 h-5 flex items-center justify-center text-[10px] font-bold text-slate-600 hover:bg-slate-100 rounded transition-colors">=</button>
                        <input type="number" id="lenValue" class="w-8 bg-transparent text-[10px] font-bold text-center outline-none" oninput="renderAccounts()">
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <div class="relative flex-1">
                        <i data-lucide="type" class="absolute left-3 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-slate-400"></i>
                        <input type="text" id="labelFilter" placeholder="Filtrer libellé..." class="w-full pl-9 pr-2 py-1.5 bg-white border border-slate-200 rounded text-xs outline-none focus:border-blue-400 shadow-sm transition-colors" oninput="renderAccounts()">
                    </div>
                    <span id="filterCount" class="text-[10px] font-bold text-blue-600 min-w-[25px] text-right">0</span>
                </div>
            </div>
            <div id="accList" class="flex-1 overflow-y-auto custom-scrollbar select-none divide-y divide-slate-50 bg-white"></div>
        </aside>

        <section id="grid-area" class="flex-1 flex flex-col p-6 bg-slate-50 overflow-hidden">
            <div class="flex flex-col h-full rounded-lg border border-slate-200 bg-white shadow-sm overflow-hidden">
                <div class="bg-slate-100 border-b border-slate-200 shrink-0">
                    <table class="grid-fixed">
                        <thead>
                            <tr id="headerRow"></tr>
                        </thead>
                    </table>
                </div>
                <div class="flex-1 overflow-y-auto custom-scrollbar">
                    <table class="grid-fixed border-collapse" id="mainGrid"></table>
                </div>
            </div>
        </section>
    </main>
</div>

<div id="partialPopup" class="fixed inset-0 bg-slate-950/40 backdrop-blur-sm z-[2000] flex items-center justify-center hidden opacity-0 transition-opacity duration-150">
    <div class="bg-white rounded-lg shadow-2xl border border-slate-200 w-[420px] overflow-hidden transform scale-95 transition-transform duration-150">
        <div class="bg-slate-900 p-3 flex items-center gap-2 text-white font-black text-[10px] uppercase">
            <i data-lucide="percent" class="w-3.5 h-3.5 text-blue-400"></i>
            <span>Configuration Mapping Partiel</span>
        </div>
        <div class="p-4 space-y-3.5">
            <div class="bg-slate-50 border border-slate-200 rounded p-2.5 space-y-1 font-bold text-[11px] text-slate-700">
                <div class="flex"><span class="w-20 text-slate-400 uppercase text-[9px] font-black">Section :</span><span id="popSection" class="text-slate-900"></span></div>
                <div class="flex"><span class="w-20 text-slate-400 uppercase text-[9px] font-black">Cellule :</span><span id="popCellLabel" class="text-blue-700"></span></div>
                <div class="flex"><span class="w-20 text-slate-400 uppercase text-[9px] font-black">Théorique :</span><span id="popSens" class="text-slate-900 font-mono"></span></div>
            </div>
            <div class="space-y-1">
                <label class="block text-[10px] font-black text-slate-500 uppercase">Votre valeur (-100 à 100) :</label>
                <input type="number" id="popValueInput" class="w-full bg-slate-50 border border-slate-300 rounded px-3 py-2 text-sm font-mono font-black">
            </div>
            <div class="flex items-center justify-end gap-2">
                <button onclick="closePartialPopup()" class="px-3 py-1.5 border border-slate-200 rounded text-[11px] font-bold text-slate-500">Annuler</button>
                <button onclick="submitPartialPopup()" class="px-4 py-1.5 bg-blue-600 text-white rounded text-[11px] font-bold">Valider</button>
            </div>
        </div>
    </div>
</div>

<div id="inspector" class="fixed hidden z-[1000] w-[720px] rounded-lg shadow-2xl border border-slate-300 inspector-blur overflow-hidden transition-all duration-200 scale-95 opacity-0">
    <div id="ins-header" class="bg-slate-900 p-2.5 flex justify-between items-center text-white font-bold text-[10px] uppercase">
        <div class="flex items-center gap-2 flex-1 min-w-0 mr-4">
            <i data-lucide="info" class="w-3.5 h-3.5 text-blue-400"></i>
            <span id="ins-title" class="truncate font-black text-slate-200"></span>
        </div>
        <button onclick="closeInspector()" class="text-slate-400 hover:text-white"><i data-lucide="x" class="w-4 h-4"></i></button>
    </div>
    <div id="ins-body" class="max-h-[450px] overflow-y-auto custom-scrollbar p-2 bg-white/50 space-y-1"></div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => { 
        lucide.createIcons(); 
        initDraggableInspector(); 
        loadAutoGrid(); 
    });

    let accounts = [], displayedAccounts = [], sectionsData = {}, currentSection = "NONE", cellInfoMap = {}, mappings = {}, currentLenOp = '=', selectedIds = [], lastClickedIndex = null;
    let columnConfigs = {}; 
    let activePopupContext = null;

    let brandMapping = {}; 
    let selectedBrand = "ALL";

    function loadAutoGrid() {
        const targetGrid = './GRID_TO_LOAD.xlsx';
        fetch(targetGrid)
            .then(res => { if (!res.ok) throw new Error(); return res.arrayBuffer(); })
            .then(buffer => { processGridWorkbook(buffer); })
            .catch(err => {
                console.error("Erreur d'initialisation de la grille :", err);
                document.getElementById('section').innerHTML = `<option value="NONE">ERREUR FICHIER</option>`;
            });
    }

    function processGridWorkbook(buffer) {
        const data = new Uint8Array(buffer);
        const workbook = XLSX.read(data, {type: 'array'});
        sectionsData = {}; columnConfigs = {}; cellInfoMap = {}; brandMapping = {};

        if (workbook.SheetNames.includes("PARAMETRES")) {
            const paramSheet = workbook.Sheets["PARAMETRES"];
            const paramRows = XLSX.utils.sheet_to_json(paramSheet);
            
            paramRows.forEach(row => {
                const b = row["MARQUE"] ? String(row["MARQUE"]).trim().toUpperCase() : null;
                const g = row["GRILLE"] ? String(row["GRILLE"]).trim() : null;
                if (b && g) {
                    if (!brandMapping[b]) brandMapping[b] = [];
                    brandMapping[b].push(g);
                }
            });
        }

        workbook.SheetNames.forEach((name) => {
            if (name === "PARAMETRES") return;

            const sheetData = XLSX.utils.sheet_to_json(workbook.Sheets[name], {header: 1}).slice(0, 502); 
            if (sheetData.length > 1) {
                sectionsData[name] = sheetData;
                const headers = sheetData[0] || [];
                const directions = sheetData[1] || [];
                
                columnConfigs[name] = headers.map((title, cIdx) => ({
                    title: title ? String(title).trim() : `Col ${cIdx + 1}`,
                    direction: directions[cIdx] !== undefined ? parseInt(directions[cIdx]) : 0
                }));

                const dataRows = sheetData.slice(2);
                dataRows.forEach((row) => {
                    const code = row[0] ? String(row[0]).trim() : "", label = row[1] || "";
                    if (code === "") return;

                    for(let cIdx = 2; cIdx < columnConfigs[name].length; cIdx++) {
                        const val = row[cIdx];
                        if (typeof val === 'number') {
                            const isDecimalInversion = (val % 1 >= 0.85 && val % 1 <= 0.95);
                            const cid = isDecimalInversion ? Math.floor(val) : Math.abs(val);
                            cellInfoMap[cid] = { 
                                rowId: code, rowLabel: label, colHeader: columnConfigs[name][cIdx].title, 
                                colIndex: cIdx, section: name, invertSens: isDecimalInversion
                            };
                        }
                    }
                });
            }
        });

        buildBrandSelector();
        updateSectionSelector();
    }

    function buildBrandSelector() {
        const brandSelect = document.getElementById('brandSelect');
        const brands = Object.keys(brandMapping).sort();
        
        let html = `<option value="ALL">TOUTES</option>`;
        brands.forEach(b => {
            html += `<option value="${b}">${b}</option>`;
        });
        brandSelect.innerHTML = html;
        brandSelect.value = selectedBrand;
    }

    function updateSectionSelector(targetSectionToPreserve = null) {
        const sectionSelect = document.getElementById('section');
        const allAvailableSheets = Object.keys(sectionsData);
        
        let filteredSheets = allAvailableSheets;
        if (selectedBrand !== "ALL" && brandMapping[selectedBrand]) {
            filteredSheets = allAvailableSheets.filter(sheet => brandMapping[selectedBrand].includes(sheet));
        }

        if (filteredSheets.length === 0) {
            sectionSelect.innerHTML = `<option value="NONE">AUCUNE GRILLE</option>`;
            currentSection = "NONE";
            return;
        }

        let html = "";
        filteredSheets.forEach(sheet => {
            html += `<option value="${sheet}">${sheet}</option>`;
        });
        sectionSelect.innerHTML = html;

        if (targetSectionToPreserve && filteredSheets.includes(targetSectionToPreserve)) {
            currentSection = targetSectionToPreserve;
        } else if (filteredSheets.includes(currentSection)) {
            // Reste sur la section actuelle
        } else {
            currentSection = filteredSheets[0];
        }
        
        sectionSelect.value = currentSection;
        renderDynamicGridHeader();
        renderDynamicGrid();
    }

    function handleBrandChange() {
        selectedBrand = document.getElementById('brandSelect').value;
        updateSectionSelector();
    }

    if (typeof switchSection === 'undefined') {
        window.switchSection = function() {
            currentSection = document.getElementById('section').value; 
            renderDynamicGridHeader();
            renderDynamicGrid(); 
        }
    }

    function exportStateJSON() {
        if (!accounts.length && !Object.keys(mappings).length) {
            alert("Rien à sauvegarder."); return;
        }
        const stateData = {
            version: "10.0",
            mask: document.getElementById('maskInput').value,
            selectedBrand: selectedBrand,
            currentSection: currentSection,
            accounts: accounts,
            mappings: mappings
        };

        const timestamp = getFormattedTimestamp();
        const blob = new Blob([JSON.stringify(stateData, null, 2)], { type: 'application/json' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `WIP_Mapping_backup_${timestamp}_${getUniqueMappedAccountsCount()}_${accounts.length}.json`;
        link.click();
    }

    function importStateJSON(event) {
        const file = event.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const stateData = JSON.parse(e.target.result);
                accounts = stateData.accounts || [];
                mappings = stateData.mappings || {};
                document.getElementById('maskInput').value = stateData.mask || "";
                document.getElementById('totalAcc').innerText = accounts.length;
                
                if (stateData.selectedBrand) selectedBrand = stateData.selectedBrand;
                if (stateData.currentSection) currentSection = stateData.currentSection;
                
                document.getElementById('brandSelect').value = selectedBrand;
                updateSectionSelector(currentSection);
                renderAccounts();
                
                alert("Session restaurée avec succès !");
            } catch (err) {
                alert("Erreur de lecture de la session.");
            }
            event.target.value = '';
        };
        reader.readAsText(file);
    }

    function getFormattedTimestamp() {
        const now = new Date();
        return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}_${String(now.getHours()).padStart(2, '0')}h${String(now.getMinutes()).padStart(2, '0')}`;
    }
    function getUniqueMappedAccountsCount() {
        const s = new Set(); Object.values(mappings).flat().forEach(m => s.add(m.accountId)); return s.size;
    }
    function getRandomToken() { return Math.random().toString(16).substring(2, 6); }

    function renderDynamicGridHeader() {
        const headerRow = document.getElementById('headerRow'); const config = columnConfigs[currentSection];
        if (!config) { headerRow.innerHTML = ''; return; }
        headerRow.innerHTML = config.map((col, cIdx) => {
            let w = cIdx === 0 ? "col-code" : (cIdx === 1 ? "col-label" : "col-data");
            let align = (cIdx === 0 || cIdx > 1) ? "text-center" : "text-left pl-4";
            let dirHTML = '<div class="text-[9px] font-bold opacity-0">&nbsp;</div>';
            if (cIdx > 1 && col.direction !== 0) {
                dirHTML = `<div class="${col.direction > 0 ? 'text-blue-600' : 'text-amber-600'} text-[10px] font-black mt-1">${col.direction > 0 ? '+' : ''}${col.direction}</div>`;
            }
            return `<th class="${w} px-2 py-3 ${align} text-[11px] font-extrabold uppercase text-slate-700 border-b border-slate-200"><div class="truncate">${col.title}</div>${dirHTML}</th>`;
        }).join('');
    }

    function renderDynamicGrid() {
        const grid = document.getElementById('mainGrid'), sheetData = sectionsData[currentSection];
        const config = columnConfigs[currentSection];
        if (!sheetData || !config) { grid.innerHTML = ''; return; }
        let html = `<tbody>`;
        sheetData.slice(2).forEach((row) => {
            const code = row[0] ? String(row[0]).trim() : "", label = row[1] || "", hasCode = code !== "";
            html += `<tr class="${hasCode ? 'hover:bg-slate-50' : 'bg-slate-100/30'}">
                <td class="col-code p-2 text-center text-[10px] font-bold ${hasCode ? 'text-blue-600' : 'text-slate-400'} border-b border-slate-100">${code}</td>
                <td class="col-label p-2 text-xs font-bold text-slate-700 border-b border-slate-100 pl-4 truncate">${label}</td>`;
            for(let cIdx = 2; cIdx < config.length; cIdx++) {
                const val = row[cIdx];
                if (!hasCode) html += `<td class="col-data p-2 border-b border-slate-100 text-center text-slate-400 italic">${val || ""}</td>`;
                else if (typeof val === 'number') {
                    const inv = (val % 1 >= 0.85 && val % 1 <= 0.95); const cid = inv ? Math.floor(val) : Math.abs(val);
                    if (val < 0) html += `<td class="col-data p-1 border-b border-slate-100 text-center opacity-20">🔒</td>`;
                    else {
                        const cnt = (mappings[cid] || []).length;
                        html += `<td class="col-data p-1 border-b border-slate-100 text-center relative">
                            <div id="cell-${cid}" onclick="handleCellClick(event, ${cid})" oncontextmenu="openCellInspector(event, ${cid})" 
                                 class="h-8 flex items-center justify-center rounded border border-slate-200 text-[14px] font-black text-blue-700 cursor-pointer hover:bg-blue-50 transition-all shadow-sm">
                                ${cid}${cnt ? `<span class="absolute top-0 right-0 bg-slate-900 text-white text-[9px] px-1.5 rounded-bl font-bold">${cnt}</span>` : ''}
                            </div></td>`;
                    }
                } else html += `<td class="col-data p-1 border-b border-slate-100"></td>`;
            }
            html += `</tr>`;
        });
        grid.innerHTML = html + `</tbody>`; lucide.createIcons();
    }

    document.getElementById('balanceInput').addEventListener('change', function(e) {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1});
            accounts = rows.slice(1).filter(r => r[0]).map(r => ({ id: String(r[0]), label: String(r[1] || '') }));
            document.getElementById('totalAcc').innerText = accounts.length; renderAccounts();
        };
        reader.readAsArrayBuffer(file);
    });

    function renderAccounts() {
        const list = document.getElementById('accList'), usageMap = {}, occurrenceMap = {};
        const accFilter = document.getElementById('accFilter').value.toLowerCase();
        const labelFilter = document.getElementById('labelFilter').value.toLowerCase();
        const mask = document.getElementById('maskInput').value;
        const unmappedOnly = document.getElementById('unmappedOnly').checked, lenVal = document.getElementById('lenValue').value;
        
        Object.values(mappings).flat().forEach(m => {
            usageMap[m.accountId] = (usageMap[m.accountId] || 0) + Math.abs(m.value);
            occurrenceMap[m.accountId] = (occurrenceMap[m.accountId] || 0) + 1;
        });

        const remainingCount = accounts.filter(a => !usageMap[a.id]).length;
        document.getElementById('absRemains').innerText = remainingCount;
        document.getElementById('pctRemains').innerText = `(${accounts.length > 0 ? Math.round((remainingCount / accounts.length) * 100) : 0}%)`;

        displayedAccounts = accounts.filter(acc => {
            if (unmappedOnly && (usageMap[acc.id] || 0) >= 100) return false;
            const fId = formatAccountId(acc.id, mask);
            let mAcc = true;
            if (accFilter !== "") {
                try { mAcc = new RegExp("^" + accFilter.replace(/\./g, "\\.").replace(/\*/g, '.*') + "$").test(fId.toLowerCase()); }
                catch(e) { mAcc = fId.toLowerCase().includes(accFilter); }
            }
            if (!mAcc || (labelFilter && !acc.label.toLowerCase().includes(labelFilter))) return false;
            if (lenVal !== "") {
                const l = acc.id.length, t = parseInt(lenVal);
                if (currentLenOp === '=' && l !== t) return false;
                if (currentLenOp === '>' && l <= t) return false;
                if (currentLenOp === '<' && l >= t) return false;
            }
            return true;
        });

        document.getElementById('filterCount').innerText = displayedAccounts.length;
        list.innerHTML = displayedAccounts.map((acc, index) => {
            const cur = usageMap[acc.id] || 0; const occ = occurrenceMap[acc.id] || 0;
            const isSel = selectedIds.includes(acc.id);
            let sColor = "bg-transparent", badge = "";
            if (cur > 0) {
                if (cur === 100) sColor = occ > 1 ? "bg-purple-600" : "bg-emerald-500";
                else if (cur < 100) { sColor = "bg-amber-500"; badge = `<span class="absolute right-3 bg-amber-600 text-white text-[9px] font-black px-1.5 py-0.5 rounded">Reste: ${100 - cur}</span>`; }
                else { sColor = "bg-red-500"; badge = `<span class="absolute right-3 bg-red-600 text-white text-[9px] font-black px-1.5 py-0.5 rounded">Trop: +${cur - 100}</span>`; }
            }
            return `<div class="acc-row relative flex items-center px-3 py-2 cursor-pointer border-l-4 ${isSel ? 'bg-blue-600 text-white border-l-blue-900 acc-item-selected' : 'border-l-transparent text-slate-700 hover:bg-slate-50'}" onclick="handleAccountClick(event, ${index})">
                <span class="font-mono text-sm font-bold w-56 shrink-0 truncate pr-2">${formatAccountId(acc.id, mask)}</span>
                <div class="flex-1 min-w-0 pr-16"><span class="block max-w-[340px] truncate text-[10px] uppercase font-bold ${isSel ? 'text-blue-100' : 'text-slate-500'}">${acc.label}</span></div>
                ${badge}<div class="absolute right-0 top-0 bottom-0 w-1 ${sColor}"></div>
            </div>`;
        }).join('');
    }

    function formatAccountId(id, mask) {
        if (!mask) return id; const segs = mask.split(/[\.\s]/).map(Number).filter(n => n > 0);
        let res = [], pos = 0; for (let len of segs) { if (pos >= id.length) break; res.push(id.substring(pos, pos + len)); pos += len; }
        if (pos < id.length) res.push(id.substring(pos)); return res.join('.');
    }

    function handleAccountClick(e, index) {
        const cid = displayedAccounts[index].id;
        if (e.shiftKey && lastClickedIndex !== null) {
            const start = Math.min(lastClickedIndex, index), end = Math.max(lastClickedIndex, index);
            selectedIds = Array.from(new Set([...selectedIds, ...displayedAccounts.slice(start, end + 1).map(a => a.id)]));
        } else if (e.ctrlKey || e.metaKey) {
            selectedIds.includes(cid) ? selectedIds = selectedIds.filter(id => id !== cid) : selectedIds.push(cid);
        } else {
            selectedIds = (selectedIds.length === 1 && selectedIds[0] === cid) ? [] : [cid];
        }
        lastClickedIndex = index; renderAccounts();
    }

    function handleCellClick(e, cid) {
        if (!selectedIds.length) return; const info = cellInfoMap[cid]; if (!info) return;
        let sens = columnConfigs[info.section][info.colIndex].direction; if (info.invertSens) sens *= -1;
        if (e.altKey) { e.preventDefault(); openPartialPopup(cid, info, sens); }
        else {
            if (!mappings[cid]) mappings[cid] = [];
            selectedIds.forEach(id => { if (!mappings[cid].some(m => m.accountId === id)) mappings[cid].push({ accountId: id, value: sens }); });
            triggerSuperFlash(cid); selectedIds = []; renderAccounts(); renderDynamicGrid();
        }
    }

    function triggerSuperFlash(cid) {
        const cell = document.getElementById(`cell-${cid}`); if (!cell) return;
        const rect = cell.getBoundingClientRect(), overlay = document.createElement('div');
        overlay.className = 'flash-overlay'; overlay.style.top = `${rect.top + window.scrollY}px`; overlay.style.left = `${rect.left + window.scrollX}px`;
        overlay.style.width = `${rect.width}px`; overlay.style.height = `${rect.height}px`;
        document.body.appendChild(overlay); overlay.addEventListener('animationend', () => overlay.remove());
    }

    function openPartialPopup(cid, info, sens) {
        activePopupContext = { cid: cid, theoreticSens: sens, accountIds: [...selectedIds] };
        document.getElementById('popSection').innerText = info.section;
        document.getElementById('popCellLabel').innerText = `${info.rowId} | ${info.colHeader}`;
        document.getElementById('popSens').innerText = `${sens > 0 ? '+' : ''}${sens}`;
        const input = document.getElementById('popValueInput'); input.value = sens;
        const pop = document.getElementById('partialPopup'); pop.classList.remove('hidden');
        setTimeout(() => { pop.classList.remove('opacity-0'); input.focus(); input.select(); }, 10);
    }
    function closePartialPopup() { document.getElementById('partialPopup').classList.add('hidden'); activePopupContext = null; }
    function submitPartialPopup() {
        const v = parseInt(document.getElementById('popValueInput').value);
        if (isNaN(v) || v === 0 || v < -100 || v > 100) return;
        if (!mappings[activePopupContext.cid]) mappings[activePopupContext.cid] = [];
        activePopupContext.accountIds.forEach(id => { if (!mappings[activePopupContext.cid].some(m => m.accountId === id)) mappings[activePopupContext.cid].push({ accountId: id, value: v }); });
        triggerSuperFlash(activePopupContext.cid); selectedIds = []; closePartialPopup(); renderAccounts(); renderDynamicGrid();
    }

    function openCellInspector(event, cid) {
        event.preventDefault(); const ins = document.getElementById('inspector'), info = cellInfoMap[cid]; if(!info) return;
        ins.dataset.mode = "CELL"; ins.dataset.id = cid;
        document.getElementById('ins-title').innerText = `CELLULE ${cid} | ${info.section} - ${info.rowId}`;
        refreshInspector(); showInspector(event.pageX, event.pageY);
    }
    function refreshInspector() {
        const ins = document.getElementById('inspector'), body = document.getElementById('ins-body'), id = ins.dataset.id, mask = document.getElementById('maskInput').value;
        if (ins.dataset.mode === "CELL") {
            const list = mappings[id] || [];
            body.innerHTML = list.map(m => `<div class="flex items-center justify-between p-2 bg-white border rounded shadow-sm">
                <span class="font-mono font-bold text-blue-700">${formatAccountId(m.accountId, mask)}</span>
                <span class="text-xs font-black">${m.value > 0 ? '+' : ''}${m.value}</span>
                <button onclick="removeMapping('${id}','${m.accountId}')" class="text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
            </div>`).join(list.length ? '' : '<div class="p-4 text-xs text-slate-400">Vide</div>');
        }
        lucide.createIcons();
    }
    function removeMapping(cid, aid) { if(mappings[cid]) mappings[cid] = mappings[cid].filter(m => m.accountId !== aid); refreshInspector(); renderAccounts(); renderDynamicGrid(); }
    function showInspector(x, y) { const ins = document.getElementById('inspector'); ins.classList.remove('hidden'); ins.style.left = x+'px'; ins.style.top = y+'px'; setTimeout(() => ins.classList.add('scale-100', 'opacity-100'), 10); }
    function closeInspector() { document.getElementById('inspector').classList.add('hidden'); }
    function toggleLenOp() { const ops = ['=', '>', '<']; currentLenOp = ops[(ops.indexOf(currentLenOp) + 1) % ops.length]; document.getElementById('lenOp').innerText = currentLenOp; renderAccounts(); }
    function initDraggableInspector() {}

    function exportMappingCSV() {
        let rows = [];
        for (const [cid, list] of Object.entries(mappings)) {
            list.forEach(m => { const acc = accounts.find(a => a.id === m.accountId); rows.push(`${m.accountId};${acc ? acc.label : ""};${cid};${m.value}`); });
        }
        const blob = new Blob(["\uFEFF" + rows.join("\n")], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a"); link.href = URL.createObjectURL(blob);
        link.download = `Adressage_${getFormattedTimestamp()}_${rows.length}_User-${getRandomToken()}.csv`; link.click();
    }

    function importAuditCSV(event) {
        const file = event.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const lines = e.target.result.split('\n');
            mappings = {};
            lines.forEach(line => {
                const parts = line.replace(/^\uFEFF/, '').trim().split(';');
                if (parts.length >= 4) {
                    const accId = parts[0].trim(), cellId = parseInt(parts[2].trim()), val = parseInt(parts[3].trim());
                    if (!mappings[cellId]) mappings[cellId] = [];
                    mappings[cellId].push({ accountId: accId, value: val });
                }
            });
            renderAccounts(); renderDynamicGrid();
            alert("Livrable CSV importé !");
        };
        reader.readAsText(file, "UTF-8");
    }
</script>
