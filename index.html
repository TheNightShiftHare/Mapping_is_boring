<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mapping Engine V12.1X</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        .flash-overlay { position: absolute; pointer-events: none; z-index: 9999; border-radius: 4px; box-shadow: 0 0 15px rgba(22, 163, 74, 0.5); animation: super-flash 0.8s ease-out forwards; }
        @keyframes super-flash { 0% { opacity: 0; transform: scale(0.9); } 20% { opacity: 0.8; transform: scale(1.1); background-color: #16a34a; } 100% { opacity: 0; transform: scale(1); } }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .grid-fixed { table-layout: fixed; width: 100%; border-spacing: 0; }
        .col-code { width: 100px; } .col-label { width: 250px; } .col-map { width: 120px; }
        .select-none { -webkit-user-select: none; user-select: none; }
    </style>
</head>
<body class="bg-slate-100 h-screen overflow-hidden font-sans text-slate-800 select-none">

<!-- Modal Audit Persistant -->
<div id="auditModal" class="hidden fixed inset-0 bg-slate-900/60 z-[9999] flex items-center justify-center">
    <div class="bg-white p-6 rounded-xl shadow-2xl border border-red-200 max-w-md w-full">
        <h2 class="text-xl font-black text-red-600 flex items-center gap-2 mb-4">
            <i data-lucide="alert-triangle"></i> Anomalie Détectée
        </h2>
        <p id="auditMsg" class="text-sm text-slate-600 mb-6 font-bold"></p>
        <button id="btnDlAudit" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-lg shadow transition-all">
            Télécharger le rapport d'audit
        </button>
        <button onclick="document.getElementById('auditModal').classList.add('hidden')" class="w-full mt-2 text-slate-400 hover:text-slate-600 text-xs font-bold uppercase underline">Fermer</button>
    </div>
</div>

<div class="flex flex-col h-full">
    <!-- Header -->
    <header class="h-14 bg-white border-b border-slate-200 flex items-center justify-between px-4 shrink-0 shadow-sm z-[100]">
        <div class="flex items-center gap-3">
            <input type="file" id="balanceInput" accept=".csv, .xlsx, .xls" class="hidden">
            <button onclick="document.getElementById('balanceInput').click()" class="flex items-center gap-2 px-3 py-1.5 bg-blue-600 hover:bg-blue-700 text-white rounded-md text-xs font-bold shadow transition-all active:scale-95 shrink-0">
                <i data-lucide="file-up" class="w-3.5 h-3.5"></i> Charger Balance
            </button>
            <div class="flex items-center gap-3 bg-blue-50 border border-blue-100 rounded-lg px-3 py-1 shadow-inner shrink-0">
                <div class="flex flex-col"><span class="text-[8px] font-black text-blue-400 uppercase leading-none">Comptes</span><span id="totalAcc" class="text-[11px] font-black text-blue-700">0</span></div>
            </div>
        </div>
        <div class="flex items-center gap-4 ml-auto">
            <span class="text-xs font-black bg-blue-600 text-white px-1.5 py-0.5 rounded tracking-tight">V12.1X</span>
            <button onclick="exportMappingCSV()" class="flex items-center gap-2 px-3 py-1.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-md text-xs font-bold">Export Mapping</button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex flex-1 overflow-hidden">
        <aside class="w-[300px] bg-white border-r border-slate-200 flex flex-col shadow-lg z-20 shrink-0">
            <div id="accList" class="flex-1 overflow-y-auto custom-scrollbar divide-y divide-slate-50"></div>
        </aside>
        <section id="grid-area" class="flex-1 flex flex-col p-6 bg-slate-50 overflow-hidden">
            <div class="flex flex-col h-full rounded-lg border border-slate-200 bg-white shadow-sm overflow-hidden">
                <div class="bg-slate-100 border-b border-slate-200 shrink-0">
                    <table class="grid-fixed">
                        <thead>
                            <tr id="headerRow" class="text-left text-[10px] uppercase font-black text-slate-500">
                                <th class="p-2 col-code">Code</th>
                                <th class="p-2 col-label">Libellé</th>
                                <th class="p-2 col-map">Mapping</th>
                            </tr>
                        </thead>
                    </table>
                </div>
                <div class="flex-1 overflow-y-auto custom-scrollbar">
                    <table class="grid-fixed border-collapse" id="mainGrid">
                        <tbody id="gridBody"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>
</div>

<script>
    let accounts = [], mappings = {}, auditData = [];
    lucide.createIcons();

    // Gestion Fichier
    document.getElementById('balanceInput').addEventListener('change', function(e) {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1});
            const dataRows = rows.slice(1).filter(r => r[0]);
            
            // Logique Audit Doublons
            const groups = {}, duplicates = [];
            dataRows.forEach((r, index) => {
                const id = String(r[0]).trim();
                const label = r[1] ? String(r[1]).trim() : "";
                const rowNum = index + 2;
                if (!groups[id]) groups[id] = [];
                groups[id].push({ id, label, rowNum });
            });

            let hasDuplicates = false;
            Object.keys(groups).forEach(id => {
                if (groups[id].length > 1) {
                    hasDuplicates = true;
                    groups[id].forEach(item => duplicates.push(item));
                }
            });

            if (hasDuplicates) {
                auditData = duplicates;
                document.getElementById('auditMsg').innerText = `Blocage : ${duplicates.length} doublons détectés. Le fichier ne peut pas être chargé.`;
                document.getElementById('auditModal').classList.remove('hidden');
                return;
            }

            // Chargement normal
            accounts = dataRows.map((r, index) => ({ uid: 'uid_' + index, id: String(r[0]).trim(), label: String(r[1] || '').trim() }));
            document.getElementById('totalAcc').innerText = accounts.length;
            renderAll();
        };
        reader.readAsArrayBuffer(file);
    });

    // Export Rapport Audit
    document.getElementById('btnDlAudit').addEventListener('click', () => {
        if (!auditData.length) return;
        auditData.sort((a, b) => a.id.localeCompare(b.id));
        let csvContent = "\uFEFFCompte;Libellé;Ligne Excel\n";
        auditData.forEach(d => { csvContent += `${d.id};"${d.label.replace(/"/g, '""')}";${d.rowNum}\n`; });
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a"); link.href = URL.createObjectURL(blob);
        link.download = `AUDIT_DOUBLONS_${new Date().getTime()}.csv`; link.click();
    });

    // Rendu Interface
    function renderAll() {
        // Liste Sidebar
        const list = document.getElementById('accList');
        list.innerHTML = accounts.map(acc => `
            <div class="px-4 py-2 border-b text-[11px] font-medium text-slate-700 hover:bg-blue-50 truncate">
                ${acc.id} <span class="text-slate-400">| ${acc.label}</span>
            </div>
        `).join('');

        // Grille Principale
        const body = document.getElementById('gridBody');
        body.innerHTML = accounts.map(acc => `
            <tr class="border-b border-slate-100 hover:bg-slate-50 transition-colors">
                <td class="p-2 col-code font-bold text-[11px] text-blue-600">${acc.id}</td>
                <td class="p-2 col-label text-[11px] text-slate-600">${acc.label}</td>
                <td class="p-2 col-map">
                    <input type="text" data-id="${acc.id}" onchange="updateMapping('${acc.id}', this.value)" 
                           class="w-full px-2 py-1 border border-slate-200 rounded text-[11px] outline-none focus:border-blue-500">
                </td>
            </tr>
        `).join('');
    }

    function updateMapping(id, val) {
        mappings[id] = val;
    }

    function exportMappingCSV() {
        let csvContent = "\uFEFFCode;Libellé;Mapping\n";
        accounts.forEach(acc => {
            const mapVal = mappings[acc.id] || "";
            csvContent += `${acc.id};"${acc.label.replace(/"/g, '""')}";"${mapVal}"\n`;
        });
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a"); 
        link.href = URL.createObjectURL(blob);
        link.download = `MAPPING_EXPORT_${new Date().getTime()}.csv`; 
        link.click();
    }
</script>
</body>
</html>
